<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Admission - Skyro-X Gym</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Admission page is used after login to save gym membership details -->
    <div class="login-container">
        <div class="logo">
            <img src="assets/skyro-x-logo.png" alt="Skyro-X Gym logo">
            <h1><span>Gym</span> Admission</h1>
        </div>

        <!-- Form fields combine account info with subscription details -->
        <form id="admissionForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" readonly>
                <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" readonly>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="text" id="phone" placeholder="Contact Number" required>
                <i class="fas fa-phone"></i>
            </div>

            <div class="form-group">
                <select id="plan" required>
                    <option value="">Select Plan</option>
                    <option value="1 Month">1 Month - 500</option>
                    <option value="3 Months">3 Months - 1400</option>
                    <option value="6 Months">6 Months - 2700</option>
                    <option value="1 Year">1 Year - 4800</option>
                </select>
            </div>

            <div class="form-group">
                <input type="date" id="subscriptionStart" required>
                <i class="fas fa-calendar-alt"></i>
            </div>

            <div class="form-group">
                <input type="date" id="subscriptionEnd" required>
                <i class="fas fa-calendar-check"></i>
            </div>

            <div class="form-group">
                <input type="date" id="admissionDate" required>
                <i class="fas fa-door-open"></i>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-file-signature"></i> Submit Admission
            </button>
        </form>

        <div class="register-link">
            <p>Back to homepage</p>
            <a href="index.html">Open Website</a>
        </div>
    </div>

    <!-- Shared API config keeps this page connected to the same backend host -->
    <script src="api-config.js"></script>
    <script>
        // Only logged-in clients should be allowed to use this page.
        const API_BASE_URL = window.API_BASE_URL || "http://localhost:5000";

        const name = localStorage.getItem("userName");
        const email = localStorage.getItem("userEmail");
        const role = localStorage.getItem("userRole");

        if (!email || role !== "client") {
            window.location.href = "login.html";
        }

        const today = new Date().toISOString().split("T")[0];
        document.getElementById("name").value = name || "";
        document.getElementById("email").value = email || "";
        document.getElementById("admissionDate").value = today;
        document.getElementById("subscriptionStart").value = today;

        // Auto-calculate subscription end date from selected plan duration.
        function calculateEndDate(startValue, planValue) {
            if (!startValue || !planValue) {
                return "";
            }

            const planMonths = {
                "1 Month": 1,
                "3 Months": 3,
                "6 Months": 6,
                "1 Year": 12
            };

            const startDate = new Date(startValue);
            const monthsToAdd = planMonths[planValue];

            if (Number.isNaN(startDate.getTime()) || !monthsToAdd) {
                return "";
            }

            startDate.setMonth(startDate.getMonth() + monthsToAdd);
            return startDate.toISOString().split("T")[0];
        }

        const planInput = document.getElementById("plan");
        const startInput = document.getElementById("subscriptionStart");
        const endInput = document.getElementById("subscriptionEnd");

        // Keep the end date field updated whenever plan/start changes.
        function syncEndDate() {
            const calculatedDate = calculateEndDate(startInput.value, planInput.value);
            if (calculatedDate) {
                endInput.value = calculatedDate;
            }
        }

        planInput.addEventListener("change", syncEndDate);
        startInput.addEventListener("change", syncEndDate);
        syncEndDate();

        // Save admission details in backend and return the client to homepage.
        document.getElementById("admissionForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const payload = {
                email,
                phone: document.getElementById("phone").value.trim(),
                plan: document.getElementById("plan").value,
                subscriptionStart: document.getElementById("subscriptionStart").value,
                subscriptionEnd: document.getElementById("subscriptionEnd").value,
                admissionDate: document.getElementById("admissionDate").value
            };

            try {
                const res = await fetch(`${API_BASE_URL}/admission`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || "Admission failed.");
                    return;
                }

                localStorage.setItem("isAdmitted", String(data.user.isAdmitted));
                alert("Admission submitted successfully.");
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                alert("Server error.");
            }
        });
    </script>
</body>
</html>
