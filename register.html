<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Skyro-X Gym</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <img src="assets/skyro-x-logo.png" alt="Skyro-X Gym logo">
            <h1><span>Skyro-X</span> Gym</h1>
        </div>

        <!-- ✅ REGISTER FORM -->
        <form id="registerForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="text" id="phone" placeholder="Mobile Number" required>
                <i class="fas fa-phone"></i>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>

        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="social-login">
            <a href="#" class="social-btn">
                <i class="fab fa-google"></i> Google
            </a>
            <a href="#" class="social-btn">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
        </div>
    </div>

    <!-- ✅ REGISTER SCRIPT -->
    <script>
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;
            const name = document.getElementById("name").value;

            try {
                const res = await fetch("http://localhost:5000/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await res.json();

                alert(data.message || "Registration completed.");

                // success pe login page redirect
                if (res.ok) {
                    window.location.href = "login.html";
                }

            } catch (err) {
                console.error(err);
                alert("❌ Server error");
            }
        });
    </script>

</body>
</html>
