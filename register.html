<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Skyro-X Gym</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <!-- Registration page creates a new account or links a manual gym record -->
    <div class="login-container">
        <div class="logo">
            <img src="assets/skyro-x-logo.png" alt="Skyro-X Gym logo">
            <h1><span>Skyro-X</span> Gym</h1>
        </div>

        <!-- Client registration form -->
        <form id="registerForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="text" id="phone" placeholder="Mobile Number" required>
                <i class="fas fa-phone"></i>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
    </div>

    <!-- Shared API config keeps register requests pointed at the active backend host -->
    <script src="api-config.js?v=5"></script>
    <script>
        // Submit registration details to backend and redirect to login after success.
        const API_BASE_URL = window.API_BASE_URL || "http://localhost:5000";

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;
            const name = document.getElementById("name").value;

            try {
                const res = await fetch(`${API_BASE_URL}/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await res.json();
                alert(data.message || "Registration completed.");

                if (res.ok) {
                    window.location.href = "login.html";
                }
            } catch (err) {
                console.error(err);
                alert("Unable to connect to server. Please check backend and Wi-Fi connection.");
            }
        });
    </script>
</body>
</html>
