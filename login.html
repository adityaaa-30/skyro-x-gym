<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Skyro-X Gym</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Login page used by regular clients -->
    <div class="login-container">
        <div class="logo">
            <img src="assets/skyro-x-logo.png" alt="Skyro-X Gym logo">
            <h1><span>Skyro-X</span> Gym</h1>
        </div>

        <!-- Client login form -->
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="forgot-password">
            <a href="#">Forgot Password?</a>
        </div>

        <div class="register-link">
            <p>Don't have an account?</p>
            <a href="register.html">Create Account</a>
        </div>

        <!-- Separate link for staff/admin access -->
        <div class="register-link secondary-link">
            <p>Gym staff access</p>
            <a href="admin-login.html">Open Admin Login</a>
        </div>
    </div>

    <!-- Shared API config + reusable client login script -->
    <script src="api-config.js?v=5"></script>
    <script src="script.js?v=5"></script>
</body>
</html>
